<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNTOMA - Hors ligne</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(135deg, #e6eff9 0%, #f4f7fb 50%, #ffffff 100%);
            font-family: Arial, sans-serif;
            color: #1D1D1F;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.92);
            border-radius: 28px;
            padding: 32px 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            text-align: center;
        }
        img {
            width: 88px;
            height: 88px;
            object-fit: contain;
            margin-bottom: 18px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }
        p {
            margin: 0;
            line-height: 1.6;
            color: #4b5563;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="/images/logo.png" alt="GNTOMA">
        <h1>Vous êtes hors ligne</h1>
        <p>Reconnectez-vous à Internet pour continuer à utiliser GNTOMA et synchroniser vos dernières actions.</p>
    </div>
</body>
</html>
